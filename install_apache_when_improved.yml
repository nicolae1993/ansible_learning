---

- hosts: all
  become: true
  tasks:

    - name: install apache2 package (Ubuntu)
      apt:
        name:
          - apache2
          - libapache2-mod-php
        state: latest
        update_cache: yes
      when: ansible_distribution == "Ubuntu"


    - name: install apache2 package and php packages (RedHat)
      dnf:
        name:
          - httpd
          - php
        state: latest
        update_cache: yes
      when: ansible_distribution == "RedHat"

